<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI導購生成</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .typing-effect {
        border-right: 2px solid #3b82f6;
        animation: blink 0.75s step-end infinite;
      }
      @keyframes blink {
        from,
        to {
          border-color: transparent;
        }
        50% {
          border-color: #3b82f6;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 font-sans min-h-screen pb-12">
    <header
      class="bg-white/60 backdrop-blur-md text-gray-800 shadow-sm px-6 py-6 mb-8"
    >
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-4">
          <div
            class="w-10 h-10 bg-gradient-to-br from-gray-200 to-white rounded-full flex items-center justify-center text-gray-700 font-semibold"
          >
            91
          </div>
          <h1 class="text-lg font-semibold tracking-tight">
            導購示範面板 — 情境化推薦
          </h1>
        </div>
        <span
          class="text-xs px-3 py-1 rounded-full border border-gray-200 bg-white/40"
          >示範模式</span
        >
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
      <section class="lg:col-span-1 space-y-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
            <i class="fa-solid fa-user-tag text-blue-500 mr-2"></i> 1. 輸入會員
          </h2>
          <div class="flex gap-2">
            <input
              id="memberIdInput"
              type="text"
              placeholder="貼上 ShopMemberId…"
              class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition text-sm"
              onkeydown="if (event.key === 'Enter') lookupUser();"
            />
            <button
              type="button"
              onclick="lookupUser()"
              class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-xl transition shadow"
            >
              查詢
            </button>
          </div>
          <div id="userLookupStatus" class="mt-2 text-xs text-gray-400">
            請輸入 ShopMemberId 後按查詢。
          </div>

          <div class="mt-3 flex flex-wrap gap-2" id="userTags"></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
            <i class="fa-solid fa-cloud-sun text-emerald-500 mr-2"></i> 2.
            外部即時資料
          </h2>
          <button
            type="button"
            onclick="loadExternalContext()"
            class="mb-3 inline-flex items-center gap-2 rounded-xl bg-emerald-600 px-4 py-2 text-xs font-semibold text-white shadow-sm transition hover:bg-emerald-700"
          >
            <i class="fa-solid fa-rotate-right"></i>
            重新請求外部 API
          </button>
          <div id="externalContextChoices" class="grid grid-cols-1 gap-3">
            <div
              class="rounded-xl border border-dashed border-gray-200 bg-gray-50 p-3 text-sm text-gray-500"
            >
              載入外部資料後，這裡會列出可勾選的天氣、地震與節慶項目。
            </div>
          </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
            <i class="fa-solid fa-magnifying-glass text-indigo-500 mr-2"></i> 3.
            商品組合選擇
          </h2>
          <div class="space-y-4 text-sm">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-2"
                >從本user猶豫商品中選擇主商品，系統將自動帶出互補品：</label
              >

              <datalist id="mainProductOptions"></datalist>
            </div>

            <div>
              <select
                id="mainProductSelect"
                onchange="selectProductByTitle(this.value)"
                class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
              >
                <option value="">載入中...</option>
              </select>
            </div>

            <div
              id="productSuggestionList"
              class="grid grid-cols-1 gap-2"
            ></div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="bg-indigo-50 p-3 rounded-xl">
                <span
                  class="block text-xs font-semibold text-indigo-600 uppercase"
                  >主商品</span
                >
                <span id="mainProduct" class="font-bold text-gray-800"
                  >尚未選擇</span
                >
                <span
                  id="mainProductPrice"
                  class="block text-sm font-semibold text-indigo-700 mt-0.5"
                ></span>
                <span
                  id="mainProductMeta"
                  class="block text-xs text-gray-500 mt-0.5"
                ></span>
              </div>
              <div class="bg-amber-50 p-3 rounded-xl">
                <span
                  class="block text-xs font-semibold text-amber-600 uppercase"
                  >互補品</span
                >
                <span id="recProduct" class="font-bold text-gray-800"
                  >尚未選擇</span
                >
                <span
                  id="recProductPrice"
                  class="block text-sm font-semibold text-amber-700 mt-0.5"
                ></span>
                <span
                  id="recProductMeta"
                  class="block text-xs text-gray-500 mt-0.5"
                ></span>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div class="bg-rose-50 p-3 rounded-xl">
                <span
                  class="block text-xs font-semibold text-rose-600 uppercase"
                  >關聯分數</span
                >
                <span id="relationScore" class="font-bold text-rose-700 text-lg"
                  >--</span
                >
              </div>
              <div class="bg-emerald-50 p-3 rounded-xl">
                <span
                  class="block text-xs font-semibold text-emerald-600 uppercase"
                  >信賴度</span
                >
                <span
                  id="relationConfidence"
                  class="font-bold text-emerald-700 text-lg"
                  >--</span
                >
              </div>
              <div class="bg-sky-50 p-3 rounded-xl">
                <span class="block text-xs font-semibold text-sky-600 uppercase"
                  >提升度</span
                >
                <span id="relationLift" class="font-bold text-sky-700 text-lg"
                  >--</span
                >
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="lg:col-span-2 space-y-6">
        <div
          class="bg-white/60 backdrop-blur-md text-gray-800 p-6 rounded-2xl shadow-sm border border-gray-100 relative"
        >
          <h3 class="text-gray-700 font-medium mb-3 text-sm flex items-center">
            <i class="fa-solid fa-list mr-2"></i> LLM 結構化參數
          </h3>
          <div
            class="p-2 rounded overflow-x-auto space-y-2 leading-relaxed text-gray-600 text-sm"
          >
            <p>
              會員猶豫意圖:
              <span
                id="promptIntent"
                class="text-rose-500 font-semibold"
              ></span>
            </p>
            <p>
              <span class="text-gray-500">納入 prompt</span>:
              <span id="promptSelectedSummary" class="text-gray-800"></span>
            </p>
            <p>
              <span class="text-gray-500">商品組合</span>: 主商品(<span
                id="promptProd1"
                class="text-gray-800"
              ></span
              >) + 互補品(<span id="promptProd2" class="text-gray-800"></span
              >)，關聯分數
              <span
                id="promptRelationScore"
                class="text-rose-500 font-semibold"
              ></span
              >。
            </p>
          </div>
        </div>

        <div
          class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center"
        >
          <div class="w-full text-left mb-4">
            <h2
              class="text-lg font-semibold text-gray-800 flex items-center justify-between"
            >
              <span
                ><i class="fa-solid fa-bell text-gray-600 mr-2"></i> 4.
                文案示範</span
              >
              <span
                id="loadingStatus"
                class="text-xs text-green-600 font-normal hidden flex items-center"
              >
                <i class="fa-solid fa-circle-notch animate-spin mr-1"></i>
                生成中...
              </span>
            </h2>
          </div>

          <div
            class="w-full max-w-sm bg-gradient-to-b from-white/60 to-white/30 p-4 rounded-[34px] shadow-2xl border border-gray-100 aspect-[9/16] relative flex flex-col justify-start overflow-hidden"
          >
            <div class="absolute inset-x-0 top-2 flex justify-center">
              <div class="w-24 h-4 bg-white/60 rounded-b-xl"></div>
            </div>

            <div
              class="flex justify-between items-center px-4 pt-6 pb-2 text-[11px] text-gray-600 z-10 font-sans"
            >
              <span id="mockTime">12:00</span>
              <div class="flex space-x-2 items-center text-gray-500">
                <i class="fa-solid fa-signal"></i>
                <i class="fa-solid fa-wifi"></i>
              </div>
            </div>

            <div
              class="mt-4 bg-white/70 backdrop-blur-sm mx-3 p-4 rounded-2xl shadow-sm border border-white/30"
            >
              <div class="flex justify-between items-center mb-2">
                <div class="flex items-center space-x-2">
                  <div
                    class="w-6 h-6 bg-gray-100 rounded-md flex items-center justify-center text-[11px] text-gray-700 font-medium"
                  >
                    商城
                  </div>
                </div>
                <span class="text-[11px] text-gray-500">現在</span>
              </div>

              <h4
                id="pushTitle"
                class="text-sm font-semibold text-gray-900 mb-1"
              >
                專屬推薦
              </h4>
              <p
                id="pushBody"
                class="text-sm text-gray-700 leading-relaxed min-h-[76px] typing-effect"
              >
                點選生成文案以模擬推播通知內容
              </p>
            </div>

            <div
              class="w-20 h-1 bg-gray-200 absolute bottom-2 left-1/2 -translate-x-1/2 rounded-full"
            ></div>
          </div>

          <button
            onclick="generateAIOutput()"
            class="mt-4 px-5 py-2 bg-gray-800 hover:bg-gray-900 text-white text-xs font-semibold rounded-xl transition shadow flex items-center space-x-1"
          >
            <i class="fa-solid fa-arrows-rotate"></i>
            <span>生成文案</span>
          </button>
        </div>
      </section>
    </main>

    <script>
      const API_BASES =
        window.location.protocol === "file:"
          ? [
              "http://localhost:3001",
              "http://localhost:3000",
              "http://localhost:3002",
              "http://localhost:3003",
              "http://localhost:3004",
            ]
          : [window.location.origin];

      async function postJsonWithFallback(path, payload) {
        let lastError = null;

        for (const base of API_BASES) {
          try {
            const response = await fetch(`${base}${path}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (response.ok) {
              return { response, base };
            }

            lastError = new Error(`HTTP ${response.status} from ${base}`);
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error("No API base available");
      }

      let latestExternalContext = null;
      let latestExternalChoices = [];
      let typingTimer = null;

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatTaipeiMonthDay(dateString) {
        if (!dateString) return "";
        const parsedDate = new Date(`${dateString}T00:00:00+08:00`);
        if (Number.isNaN(parsedDate.getTime())) return dateString;
        return new Intl.DateTimeFormat("zh-TW", {
          timeZone: "Asia/Taipei",
          month: "numeric",
          day: "numeric",
        }).format(parsedDate);
      }

      function buildExternalChoices(contextData) {
        const choices = [];
        const weather = contextData?.weather;
        const disaster = contextData?.disaster;
        const holiday = contextData?.holiday;

        // 1. 現在天氣（不顯示溫度）
        if (weather && weather.weatherText) {
          choices.push({
            key: "weatherText",
            label: "現在天氣",
            value: weather.weatherText,
            detail: weather.stationName
              ? `${weather.stationName}｜${weather.countyName}`
              : weather.countyName || "",
          });
        }

        // 2. 地震項目
        if (disaster?.earthquake) {
          const earthquake = disaster.earthquake;
          choices.push({
            key: "earthquake",
            label: "地震觀測",
            value: `規模 ${earthquake.magnitude} (震央: ${earthquake.epicenter})`,
            detail: `發生時間: ${earthquake.originTime}`,
          });
        }

        // 3. 🛠️ 動態產生 W-C0033-003/004/005 的 Checkbox
        if (disaster?.alerts && disaster.alerts.length > 0) {
          disaster.alerts.forEach((alert, index) => {
            const isTyphoon =
              (alert.alertType || "").toString().includes("颱風") ||
              (alert.alertType || "")
                .toString()
                .toLowerCase()
                .includes("typhoon");
            choices.push({
              key: `climateAlert:${index}`, // 使用索引作爲與後端溝通的金鑰
              label: isTyphoon ? `颱風警報` : `氣候警戒(${alert.alertType})`,
              value: `${alert.county} ${alert.description}`,
              detail: `有效期限: ${alert.startTime.slice(5, 16)} 至 ${alert.endTime.slice(5, 16)}`,
            });
          });
        }

        // 4. 節慶項目
        (holiday?.upcoming || []).forEach((item) => {
          choices.push({
            key: `holiday:${item.dateString}`,
            label: `${formatTaipeiMonthDay(item.dateString)} ${item.name}`,
            value: `距今天 ${item.diffDays} 天`,
          });
        });

        return choices;
      }

      function renderExternalContextChoices() {
        const container = document.getElementById("externalContextChoices");
        if (!container) return;

        if (!latestExternalChoices.length) {
          container.innerHTML = `
            <div class="rounded-xl border border-dashed border-gray-200 bg-gray-50 p-3 text-sm text-gray-500">
              目前沒有可選的外部資料。
            </div>
          `;
          return;
        }

        container.innerHTML = latestExternalChoices
          .map(
            (choice, index) => `
              <label class="flex items-start gap-3 rounded-xl border border-gray-200 bg-gray-50 p-3 cursor-pointer">
                <input
                  type="checkbox"
                  data-context-key="${escapeHtml(choice.key)}"
                  data-context-label="${escapeHtml(choice.label)}"
                  checked
                  onchange="syncPromptPreview()"
                  class="mt-1 h-4 w-4 accent-gray-800"
                />
                <div class="flex-1">
                  <div class="text-sm font-medium text-gray-800">${escapeHtml(choice.label)}</div>
                  <div class="text-sm text-gray-600 mt-0.5">${escapeHtml(choice.value)}</div>
                  ${choice.detail ? `<div class="text-xs text-gray-500 mt-1">${escapeHtml(choice.detail)}</div>` : ""}
                </div>
              </label>
            `,
          )
          .join("");
      }

      function collectContextSelection() {
        const checkboxes = document.querySelectorAll(
          "#externalContextChoices input[type='checkbox']",
        );
        if (!checkboxes.length) {
          return { selectedContextKeys: [], selectedContextLabels: [] };
        }

        const selectedCheckboxes = Array.from(checkboxes).filter(
          (input) => input.checked,
        );

        return {
          selectedContextKeys: selectedCheckboxes.map(
            (input) => input.dataset.contextKey,
          ),
          selectedContextLabels: selectedCheckboxes.map(
            (input) => input.dataset.contextLabel || input.dataset.contextKey,
          ),
        };
      }

      function getSelectedContextLabels() {
        return collectContextSelection().selectedContextLabels || [];
      }

      function setTextContent(id, value) {
        const element = document.getElementById(id);
        if (!element) return;
        element.innerText = value ?? "";
      }

      let latestProductCatalog = [];
      let latestProductSelection = null;
      let productSearchTimer = null;

      function normalizeProductText(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "");
      }

      function formatProductMetric(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return "--";
        return Number.isInteger(num) ? String(num) : num.toFixed(3);
      }

      function renderRecsysOptions() {
        const datalist = document.getElementById("mainProductOptions");
        if (!datalist) return;

        datalist.innerHTML = latestProductCatalog
          .map(
            (product) =>
              `<option value="${escapeHtml(product.title)}"></option>`,
          )
          .join("");

        const select = document.getElementById("mainProductSelect");
        if (select) {
          select.innerHTML = [
            `<option value="">請選擇主商品</option>`,
            ...latestProductCatalog.map(
              (product) =>
                `<option value="${escapeHtml(product.title)}">${escapeHtml(product.title)}</option>`,
            ),
          ].join("");
        }
      }

      function renderProductSuggestions(query = "") {
        const container = document.getElementById("productSuggestionList");
        if (!container) return;

        const normalizedQuery = normalizeProductText(query);
        const filteredProducts = normalizedQuery
          ? latestProductCatalog.filter((product) =>
              normalizeProductText(product.title).includes(normalizedQuery),
            )
          : latestProductCatalog.slice(0, 8);

        if (!filteredProducts.length) {
          container.innerHTML = `
            <div class="rounded-xl border border-dashed border-gray-200 bg-gray-50 p-3 text-xs text-gray-500">
              找不到相符商品，請改用下拉選單或更完整的關鍵字。
            </div>
          `;
          return;
        }

        container.innerHTML = filteredProducts
          .slice(0, 8)
          .map((product) => {
            const bestComplement = product.bestComplement;
            return `
              <button
                type="button"
                onclick="selectProductByTitle(${JSON.stringify(product.title)})"
                class="text-left rounded-xl border border-gray-200 bg-gray-50 p-3 transition hover:border-indigo-400 hover:bg-indigo-50"
              >
                <div class="flex items-baseline justify-between">
                  <div class="text-sm font-medium text-gray-800">${escapeHtml(product.title)}</div>
                  ${product.price != null ? `<div class="text-xs font-semibold text-indigo-600 ml-2 shrink-0">${formatPrice(product.price)}</div>` : ""}
                </div>
                <div class="mt-1 text-xs text-gray-500">
                  ${bestComplement ? `互補品：${escapeHtml(bestComplement.title)}${bestComplement.price != null ? ` (${formatPrice(bestComplement.price)})` : ""} ｜ 分數 ${formatProductMetric(bestComplement.score)}` : "目前沒有推薦互補品"}
                </div>
              </button>
            `;
          })
          .join("");
      }

      function findProductMatch(query) {
        const normalizedQuery = normalizeProductText(query);
        if (!normalizedQuery || !latestProductCatalog.length) return null;

        const exactMatch = latestProductCatalog.find(
          (product) => normalizeProductText(product.title) === normalizedQuery,
        );
        if (exactMatch) return exactMatch;

        const partialMatches = latestProductCatalog.filter((product) =>
          normalizeProductText(product.title).includes(normalizedQuery),
        );
        if (!partialMatches.length) return null;

        partialMatches.sort((left, right) => {
          const rightScore = right.bestComplement?.score ?? -Infinity;
          const leftScore = left.bestComplement?.score ?? -Infinity;
          if (rightScore !== leftScore) return rightScore - leftScore;
          return left.title.length - right.title.length;
        });

        return partialMatches[0];
      }

      function handleProductSearchInput() {
        const input = document.getElementById("mainProductSearch");
        renderProductSuggestions(input?.value || "");
      }

      function handleProductSearchKeydown(event) {
        if (event.key !== "Enter") return;

        event.preventDefault();
        resolveProductSelection();
      }

      function formatPrice(price) {
        if (price == null || !Number.isFinite(Number(price))) return null;
        return `NT$ ${Number(price).toLocaleString("zh-TW")}`;
      }

      function updateProductSelectionDisplay(selection) {
        const statusEl = document.getElementById("productSelectionStatus");
        const mainProductEl = document.getElementById("mainProduct");
        const mainProductMetaEl = document.getElementById("mainProductMeta");
        const mainProductPriceEl = document.getElementById("mainProductPrice");
        const recProductEl = document.getElementById("recProduct");
        const recProductMetaEl = document.getElementById("recProductMeta");
        const recProductPriceEl = document.getElementById("recProductPrice");
        const relationScoreEl = document.getElementById("relationScore");
        const relationConfidenceEl =
          document.getElementById("relationConfidence");
        const relationLiftEl = document.getElementById("relationLift");

        if (!selection) {
          if (statusEl) {
            statusEl.innerText =
              "請輸入主商品名稱，系統會從真實 recsys 關聯表中找出互補品。";
          }
          setTextContent("mainProduct", "尚未選擇");
          setTextContent("mainProductMeta", "");
          if (mainProductPriceEl) mainProductPriceEl.innerText = "";
          setTextContent("recProduct", "尚未選擇");
          setTextContent("recProductMeta", "");
          if (recProductPriceEl) recProductPriceEl.innerText = "";
          setTextContent("relationScore", "--");
          setTextContent("relationConfidence", "--");
          setTextContent("relationLift", "--");
          return;
        }

        const bestComplement = selection.bestComplement || null;

        if (mainProductEl)
          mainProductEl.innerText = selection.title || "尚未選擇";
        if (mainProductMetaEl) {
          mainProductMetaEl.innerText = `共 ${selection.relationCount || 0} 筆關聯資料`;
        }
        if (mainProductPriceEl) {
          mainProductPriceEl.innerText = formatPrice(selection.price) || "";
        }

        if (bestComplement) {
          if (recProductEl)
            recProductEl.innerText = bestComplement.title || "尚未選擇";
          if (recProductMetaEl) {
            recProductMetaEl.innerText = "";
          }
          if (recProductPriceEl) {
            recProductPriceEl.innerText =
              formatPrice(bestComplement.price) || "";
          }
          if (relationScoreEl)
            relationScoreEl.innerText = formatProductMetric(
              bestComplement.score,
            );
          if (relationConfidenceEl)
            relationConfidenceEl.innerText = formatProductMetric(
              bestComplement.confidence,
            );
          if (relationLiftEl)
            relationLiftEl.innerText = formatProductMetric(bestComplement.lift);
          if (statusEl) {
            statusEl.innerText = `已選擇 ${selection.title}，自動帶出 ${bestComplement.title}。`;
          }
        } else {
          if (recProductEl) recProductEl.innerText = "目前沒有可用互補品";
          if (recProductMetaEl)
            recProductMetaEl.innerText = "請換一個主商品或重新載入資料。";
          if (recProductPriceEl) recProductPriceEl.innerText = "";
          if (relationScoreEl) relationScoreEl.innerText = "--";
          if (relationConfidenceEl) relationConfidenceEl.innerText = "--";
          if (relationLiftEl) relationLiftEl.innerText = "--";
          if (statusEl) {
            statusEl.innerText = `已選擇 ${selection.title}，但目前沒有可用的互補品。`;
          }
        }
      }

      function applyProductSelection(selection) {
        latestProductSelection = selection || null;

        const input = document.getElementById("mainProductSearch");
        if (input && selection?.title) {
          input.value = selection.title;
        }

        const select = document.getElementById("mainProductSelect");
        if (select && selection?.title) {
          select.value = selection.title;
        }

        updateProductSelectionDisplay(latestProductSelection);
        syncPromptPreview();
      }

      function selectProductByTitle(title) {
        if (!title) {
          updateProductSelectionDisplay(null);
          syncPromptPreview();
          return;
        }

        const matchedProduct = latestProductCatalog.find(
          (product) => product.title === title,
        );
        if (!matchedProduct) {
          return;
        }

        applyProductSelection(matchedProduct);
        renderProductSuggestions(title);
      }

      function resolveProductSelection() {
        const input = document.getElementById("mainProductSearch");
        const query = input?.value || "";

        if (!query.trim()) {
          updateProductSelectionDisplay(null);
          renderProductSuggestions("");
          return;
        }

        const matchedProduct = findProductMatch(query);
        if (matchedProduct) {
          applyProductSelection(matchedProduct);
          renderProductSuggestions(matchedProduct.title);
          return;
        }

        const statusEl = document.getElementById("productSelectionStatus");
        if (statusEl) {
          statusEl.innerText = `找不到「${query}」對應的主商品，請改用下拉建議或重試搜尋。`;
        }

        renderProductSuggestions(query);
      }

      function debouncedResolveProductSelection() {
        if (productSearchTimer) clearTimeout(productSearchTimer);
        productSearchTimer = setTimeout(() => {
          resolveProductSelection();
        }, 180);
      }

      async function loadRecsysCatalog() {
        const statusEl = document.getElementById("productSelectionStatus");
        if (statusEl) {
          statusEl.innerText = "正在載入真實 recsys 商品清單...";
        }

        for (const base of API_BASES) {
          try {
            const response = await fetch(`${base}/api/recsys-products`);
            if (!response.ok) {
              continue;
            }

            const data = await response.json();
            latestProductCatalog = Array.isArray(data.products)
              ? data.products
              : [];
            renderRecsysOptions();

            const input = document.getElementById("mainProductSearch");
            const existingQuery = input?.value?.trim() || "";
            if (existingQuery) {
              const selection = findProductMatch(existingQuery);
              if (selection) {
                applyProductSelection(selection);
              }
            } else if (latestProductCatalog.length) {
              applyProductSelection(latestProductCatalog[0]);
            } else {
              updateProductSelectionDisplay(null);
            }

            renderProductSuggestions(existingQuery);
            return;
          } catch (error) {
            console.warn("Failed to load recsys catalog from", base, error);
          }
        }

        latestProductCatalog = [];
        latestProductSelection = null;
        renderRecsysOptions();
        renderProductSuggestions("");
        updateProductSelectionDisplay(null);

        if (statusEl) {
          statusEl.innerText =
            "找不到 recsys 商品清單，請確認後端是否已有 relation_product CSV。";
        }
      }

      let currentUserData = { shopMemberId: null, intentLabel: null };

      async function lookupUser() {
        const input = document.getElementById("memberIdInput");
        const shopMemberId = (input?.value || "").trim();
        const statusEl = document.getElementById("userLookupStatus");

        if (!shopMemberId) {
          if (statusEl) statusEl.innerText = "請輸入 ShopMemberId 後按查詢。";
          return;
        }

        if (statusEl) {
          statusEl.innerText = "查詢中...";
          statusEl.className = "mt-2 text-xs text-gray-400";
        }

        try {
          const { response } = await postJsonWithFallback(
            "/api/user-products",
            {
              shopMemberId,
            },
          );
          const data = await response.json();

          if (!data.found) {
            currentUserData = { shopMemberId: null, intentLabel: null };
            document.getElementById("userTags").innerHTML = "";
            latestProductCatalog = [];
            renderRecsysOptions();
            renderProductSuggestions("");
            updateProductSelectionDisplay(null);
            if (statusEl) {
              statusEl.innerText =
                "找不到此會員，請確認 ShopMemberId 是否正確。";
              statusEl.className = "mt-2 text-xs text-rose-500";
            }
            return;
          }

          currentUserData = {
            shopMemberId,
            intentLabel: data.hesitationType,
          };

          if (statusEl) {
            const note = data.usedFallback
              ? "｜猶豫商品不在關聯資料庫，顯示全域推薦商品"
              : "";
            statusEl.innerText = `找到會員｜${data.hesitationType}｜共 ${data.products.length} 項商品${note}`;
            statusEl.className = data.usedFallback
              ? "mt-2 text-xs text-amber-600"
              : "mt-2 text-xs text-emerald-600";
          }

          latestProductCatalog = data.products || [];
          renderRecsysOptions();
          renderProductSuggestions("");

          if (latestProductCatalog.length) {
            applyProductSelection(latestProductCatalog[0]);
          } else {
            updateProductSelectionDisplay(null);
          }

          updateDemoScenario(true);
        } catch (err) {
          if (statusEl) {
            statusEl.innerText = `查詢失敗：${err.message}`;
            statusEl.className = "mt-2 text-xs text-rose-500";
          }
          console.error(err);
        }
      }

      function updateDemoScenario(shouldLoadExternal = true) {
        if (!currentUserData.intentLabel) return;

        const tagsContainer = document.getElementById("userTags");
        if (tagsContainer) {
          let badgeColor = "bg-blue-100 text-blue-800";
          if (currentUserData.intentLabel === "規格猶豫")
            badgeColor = "bg-amber-100 text-amber-800";
          if (currentUserData.intentLabel === "價格猶豫")
            badgeColor = "bg-rose-100 text-rose-800";

          tagsContainer.innerHTML = `
            <span class="px-2.5 py-1 rounded-md text-xs font-bold ${badgeColor}">
              <i class="fa-solid fa-tag mr-1"></i> ${currentUserData.intentLabel}
            </span>
          `;
        }

        syncPromptPreview();
        if (shouldLoadExternal) {
          loadExternalContext();
        }
      }

      function syncPromptPreview() {
        if (!currentUserData.intentLabel) return;

        const selectedProduct = latestProductSelection || null;
        const bestComplement = selectedProduct?.bestComplement || null;
        const selectedContextLabels = getSelectedContextLabels();
        const productSummary = selectedProduct
          ? `${selectedProduct.title}${bestComplement?.title ? ` → ${bestComplement.title}` : ""}`
          : "尚未選擇主商品";
        const externalSummary =
          selectedContextLabels.length > 0
            ? selectedContextLabels.join("、")
            : "未勾選任何外部資訊";

        setTextContent("promptIntent", currentUserData.intentLabel);
        setTextContent(
          "promptProd1",
          selectedProduct?.title || "尚未選擇主商品",
        );
        setTextContent(
          "promptProd2",
          bestComplement?.title || "尚未帶出互補品",
        );
        setTextContent(
          "promptRelationScore",
          formatProductMetric(bestComplement?.score),
        );

        const select = document.getElementById("mainProductSelect");
        if (select && selectedProduct?.title) {
          select.value = selectedProduct.title;
        }

        const summaryEl = document.getElementById("promptSelectedSummary");
        if (summaryEl) {
          summaryEl.innerText = `${productSummary}｜${externalSummary}`;
        }
      }

      // 🛠️ 嚴格模式：核心 Debug 區塊之一
      async function loadExternalContext() {
        if (!currentUserData.intentLabel) return;
        const userData = currentUserData;

        const apiStatusEl = document.getElementById("apiStatus");
        const apiStatusDetailEl = document.getElementById("apiStatusDetail");
        const apiStatusTimeEl = document.getElementById("apiStatusTime");

        if (apiStatusEl) {
          apiStatusEl.innerText = "載入外部資料";
          apiStatusEl.className = "text-gray-500 font-semibold";
        }
        if (apiStatusDetailEl)
          apiStatusDetailEl.innerText = "正在抓取 CWA 天氣資料...";

        try {
          const { response: resp, base } = await postJsonWithFallback(
            "/api/context",
            {
              userData: {
                name: userData.name,
                cityName: "臺北市",
                intentLabel: userData.intentLabel,
              },
            },
          );

          const data = await resp.json();

          // 🔥 在開發工具 Console 印出 API 原始回傳值，供你抓蟲
          console.log("=== [/api/context] 後端回傳原始資料 ===", data);

          latestExternalContext = data;
          latestExternalChoices = buildExternalChoices(data?.context);
          renderExternalContextChoices();

          const cwaHoliday = data?.context?.holiday;
          const cwaDisaster = data?.context?.disaster;
          const weatherSummary = data?.summary?.weatherText || "--";
          const holidaySummary = data?.summary?.holidayText || "30 天內無節慶";
          const disasterSummary =
            data?.summary?.disasterText || "目前無明顯地震或颱風警報";

          const cwaWeatherEl = document.getElementById("cwaWeather");
          if (cwaWeatherEl)
            cwaWeatherEl.innerText =
              data?.context?.weather?.weatherText || "[未抓到 API 天氣描述]";

          const cwaDisasterEl = document.getElementById("cwaDisaster");
          if (cwaDisasterEl) cwaDisasterEl.innerText = disasterSummary;

          const cwaHolidayEl = document.getElementById("cwaHoliday");
          if (cwaHolidayEl)
            cwaHolidayEl.innerText = holidaySummary.replaceAll("｜", "\n");

          setTextContent("promptWeather", weatherSummary);
          setTextContent("promptFestival", holidaySummary);

          if (apiStatusEl) {
            apiStatusEl.innerText = "外部資料已載入";
            apiStatusEl.className = "text-emerald-600 font-semibold";
          }
          if (apiStatusDetailEl) {
            apiStatusDetailEl.innerText = `API 請求成功。請按下 F12 查看 Console 的資料欄位。`;
          }
          if (apiStatusTimeEl)
            apiStatusTimeEl.innerText = `更新時間：${new Date().toLocaleTimeString()}`;

          syncPromptPreview();
        } catch (err) {
          if (apiStatusEl) {
            apiStatusEl.innerText = "外部資料載入失敗";
            apiStatusEl.className = "text-rose-600 font-semibold";
          }
          if (apiStatusDetailEl)
            apiStatusDetailEl.innerText = `無法抓到外部資料：${err.message}`;
        }
      }

      // 🛠️ 嚴格模式：核心 Debug 區塊之二
      async function generateAIOutput() {
        if (!currentUserData.intentLabel) {
          const pushBody = document.getElementById("pushBody");
          if (pushBody) pushBody.innerText = "請先查詢會員 ID 後再生成文案。";
          return;
        }
        const userKey = currentUserData.shopMemberId;
        const userData = currentUserData;

        if (!latestProductSelection && latestProductCatalog.length) {
          applyProductSelection(latestProductCatalog[0]);
        }

        const weather = latestExternalContext?.summary?.weatherText || "";
        const festival = latestExternalContext?.summary?.holidayText || "";
        const selection = collectContextSelection();

        setTextContent("promptIntent", userData.intentLabel);
        setTextContent("promptWeather", weather);
        setTextContent("promptFestival", festival);
        setTextContent(
          "promptProd1",
          latestProductSelection?.title || "尚未選擇主商品",
        );
        setTextContent(
          "promptProd2",
          latestProductSelection?.bestComplement?.title || "尚未帶出互補品",
        );
        setTextContent(
          "promptRelationScore",
          formatProductMetric(latestProductSelection?.bestComplement?.score),
        );

        const loadingStatus = document.getElementById("loadingStatus");
        const pushBody = document.getElementById("pushBody");
        if (loadingStatus) loadingStatus.classList.remove("hidden");
        if (pushBody) {
          pushBody.innerText = "系統正在生成個人化推薦文案...";
          pushBody.classList.remove("typing-effect");
        }

        await new Promise((r) => setTimeout(r, 300));

        let targetText = "";
        try {
          const payload = {
            userKey,
            weather,
            festival,
            selection,
            contextData: latestExternalContext?.context || null,
            productSelection: latestProductSelection,
            userData: {
              name: userData.shopMemberId || "",
              cityName: "臺北市",
              intentLabel: userData.intentLabel,
            },
            selectedContextKeys: selection.selectedContextKeys,
          };

          const { response: resp, base } = await postJsonWithFallback(
            "/api/generate",
            payload,
          );

          if (resp.ok) {
            const data = await resp.json();

            // 🔥 在開發工具 Console 印出此處 API 的原始回傳值
            console.log("=== [/api/generate] 後端回傳原始資料 ===", data);

            targetText = data.text || "";

            const cwaHoliday = data?.context?.holiday;
            const cwaDisaster = data?.context?.disaster;
          }
        } catch (err) {
          console.warn("Error calling backend", err);
        }

        if (!targetText) {
          if (loadingStatus) loadingStatus.classList.add("hidden");
          if (pushBody) {
            pushBody.innerText = "Gemini 尚未回傳文案，請查看後端錯誤訊息。";
            pushBody.classList.remove("typing-effect");
          }
          return;
        }
        if (loadingStatus) loadingStatus.classList.add("hidden");

        const pushTitleEl = document.getElementById("pushTitle");
        if (pushTitleEl)
          pushTitleEl.innerText = `🔔 專屬您的【${currentUserData.intentLabel}】關懷`;

        if (pushBody) {
          let index = 0;
          pushBody.innerText = "";
          pushBody.classList.add("typing-effect");
          if (typingTimer) clearInterval(typingTimer);

          typingTimer = setInterval(() => {
            if (index < targetText.length) {
              pushBody.innerText += targetText.charAt(index);
              index++;
            } else {
              clearInterval(typingTimer);
              pushBody.classList.remove("typing-effect");
            }
          }, 15);
        }
      }

      async function initPage() {
        const now = new Date();
        const mockTimeEl = document.getElementById("mockTime");
        if (mockTimeEl) {
          mockTimeEl.innerText = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
        }
      }

      window.onload = initPage;
    </script>
  </body>
